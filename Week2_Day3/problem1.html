<!DOCTYPE html>
<html>
<head>
    <title>Feedback Button</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

    <button id="feedbackBtn">Submit Feedback</button>
    <div id="message"></div>

    <script>
        const button = document.getElementById("feedbackBtn");
        const message = document.getElementById("message");

        button.addEventListener("click", () => {
            message.textContent = "Thank you! Your feedback has been submitted successfully.";
        });
    </script>

</body>
</html>
