<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Event Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="#">College Events</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="#">Events</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
</ul>

</div>
</div>
</nav>


<!-- Dashboard -->
<div class="container my-5">

<div class="d-flex justify-content-between mb-3">

<h3>Upcoming Events</h3>

<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#eventModal">
Add Event
</button>

</div>


<div class="row g-4">

<div class="col-md-6 col-lg-4">

<div class="card">

<div class="card-body">
<h5 class="card-title">Tech Fest</h5>
<p>Date: 10 March</p>
<button class="btn btn-outline-primary btn-sm">Details</button>
</div>

</div>

</div>


<div class="col-md-6 col-lg-4">

<div class="card">

<div class="card-body">
<h5 class="card-title">Coding Competition</h5>
<p>Date: 18 March</p>
<button class="btn btn-outline-primary btn-sm">Details</button>
</div>

</div>

</div>

</div>

</div>


<!-- Modal -->
<div class="modal fade" id="eventModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Add Event</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>


<div class="modal-body">

<form>

<div class="mb-3">
<label class="form-label">Event Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea class="form-control"></textarea>
</div>

<button class="btn btn-primary">Save Event</button>

</form>

</div>

</div>
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
